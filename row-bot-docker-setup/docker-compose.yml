services:
  rowbot:
    build:
      context: ./docker
      dockerfile: Dockerfile
    # Override for multi-instance setups (set ROW_BOT_INSTANCE_NAME in .env;
    # setup.sh can configure this for you)
    container_name: ${ROW_BOT_INSTANCE_NAME:-rowbot-app}
    ports:
      # Default: localhost only (127.0.0.1:8080)
      # To access from network: set ROW_BOT_BIND=0.0.0.0 in .env
      # See NETWORK_SETUP.md for security guidance on network exposure
      - "${ROW_BOT_BIND:-127.0.0.1}:${ROW_BOT_PORT:-8080}:8080"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - rowbot-data:/home/rowbot/.row-bot
      # Row-Bot's filesystem tools default to ~/Documents/Row-Bot as the
      # workspace root — mount the volume there so user files persist
      # across container rebuilds (NOT at /app/workspace, which Row-Bot
      # never reads).
      - rowbot-workspace:/home/rowbot/Documents/Row-Bot
    restart: ${RESTART_POLICY:-unless-stopped}
    # Row-Bot's launcher handles SIGINT (Ctrl+C) but not SIGTERM.
    # Sending SIGINT on "docker stop" lets it shut down gracefully and
    # flush SQLite WAL files instead of being hard-killed.
    stop_signal: SIGINT
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # On Linux, uncomment the line below and comment out the one above to use host network
    # networks:
    #   - host

volumes:
  rowbot-data:
    driver: local
  rowbot-workspace:
    driver: local
