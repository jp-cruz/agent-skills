services:
  rowbot:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: rowbot-app
    ports:
      # Default: localhost only (127.0.0.1:8080)
      # To access from network: set ROWBOT_BIND=0.0.0.0 in .env
      # See NETWORK_SETUP.md for security guidance on network exposure
      - "${ROWBOT_BIND:-127.0.0.1}:${ROWBOT_PORT:-8080}:8080"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - rowbot-data:/home/rowbot/.row-bot
      - rowbot-workspace:/app/workspace
    restart: ${RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # On Linux, uncomment the line below and comment out the one above to use host network
    # networks:
    #   - host

volumes:
  rowbot-data:
    driver: local
  rowbot-workspace:
    driver: local
