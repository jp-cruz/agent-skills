name: Cross-Platform Validation

on:
  push:
    branches: [ main ]
    tags: [ v* ]
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC

jobs:
  validate-macos:
    name: Validate macOS (Intel & Apple Silicon)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-12, macos-13, macos-14]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check system info
        run: |
          echo "OS: $(uname -s)"
          echo "Architecture: $(uname -m)"
          echo "Shell: $SHELL"
          docker --version
          docker-compose --version

      - name: Validate setup.sh
        run: |
          cp .env.example .env
          chmod +x setup.sh check-docker.sh preflight-check.sh
          bash -n setup.sh
          echo "✓ setup.sh syntax valid on macOS"

      - name: Test preflight-check.sh
        run: |
          bash preflight-check.sh > /tmp/preflight.log 2>&1 || true
          cat /tmp/preflight.log | head -50

  validate-linux:
    name: Validate Linux (Ubuntu/CentOS)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-20.04, ubuntu-22.04]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check system info
        run: |
          echo "OS: $(uname -s)"
          echo "Arch: $(uname -m)"
          uname -a
          docker --version
          docker-compose --version

      - name: Validate setup.sh on Linux
        run: |
          cp .env.example .env
          # Update .env for Linux
          sed -i 's|http://host.docker.internal:11434|http://localhost:11434|g' .env
          chmod +x setup.sh check-docker.sh preflight-check.sh
          bash -n setup.sh
          echo "✓ setup.sh syntax valid on Linux"

      - name: Test preflight-check.sh on Linux
        run: |
          bash preflight-check.sh > /tmp/preflight.log 2>&1 || true
          cat /tmp/preflight.log | head -50

      - name: Test Docker build
        run: |
          docker-compose build --no-cache 2>&1 | tail -20
          docker images | grep thoth-app

  validate-windows:
    name: Validate Windows (WSL2)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable WSL2
        run: |
          wsl --version
          echo "WSL version check completed"

      - name: Setup Docker
        uses: docker/setup-buildx-action@v2

      - name: Check Windows setup
        shell: bash
        run: |
          echo "OS: $(uname -s)"
          docker --version
          docker-compose --version

      - name: Validate setup.bat (syntax)
        shell: pwsh
        run: |
          Get-Content setup.bat | Select-Object -First 20
          echo "✓ setup.bat exists and is readable"

      - name: Test Docker build on Windows
        run: |
          docker-compose build --no-cache 2>&1 | tail -20
          docker images | grep thoth-app

  ollama-integration:
    name: Ollama Integration Test
    runs-on: ubuntu-latest
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        options: >-
          --health-cmd="curl -f http://localhost:11434/api/tags || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Ollama
        run: |
          until curl -s http://localhost:11434/api/tags > /dev/null; do
            echo "Waiting for Ollama..."
            sleep 2
          done
          echo "✓ Ollama is ready"

      - name: Configure .env for Ollama
        run: |
          cp .env.example .env
          sed -i 's|http://host.docker.internal:11434|http://host.docker.internal:11434|g' .env
          echo "OLLAMA_BASE_URL=http://localhost:11434" >> .env

      - name: Test Ollama connectivity
        run: |
          curl -s http://localhost:11434/api/tags | python3 -m json.tool | head -20
          echo "✓ Ollama API responding"

status:
  name: Cross-Platform Status
  runs-on: ubuntu-latest
  needs: [validate-macos, validate-linux, validate-windows]
  if: always()
  steps:
    - name: Report status
      run: |
        if [[ "${{ needs.validate-macos.result }}" == "success" ]] && \
           [[ "${{ needs.validate-linux.result }}" == "success" ]] && \
           [[ "${{ needs.validate-windows.result }}" == "success" ]]; then
          echo "✅ All cross-platform validations passed"
        else
          echo "⚠️  Some platform validations require attention"
        fi
