name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate tag matches version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION=$(grep '"version"' skill-manifest.json | head -1 | grep -o '[0-9.]*')
          if [[ "$TAG" != "v$VERSION" ]]; then
            echo "ERROR: Tag $TAG does not match version v$VERSION"
            exit 1
          fi
          echo "✓ Tag matches version"

      - name: Check CHANGELOG updated
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          grep -q "\[$VERSION\]" CHANGELOG.md || (echo "CHANGELOG not updated for $VERSION" && exit 1)
          echo "✓ CHANGELOG updated for version"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # Extract release notes from CHANGELOG.md
          awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md | head -n -1 > /tmp/release_notes.md
          cat /tmp/release_notes.md
          echo "RELEASE_NOTES=$(cat /tmp/release_notes.md | head -c 500)..." >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '0.') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docs:
    name: Publish Documentation
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build documentation
        run: |
          echo "Documentation files:"
          ls -lh *.md | grep -E "README|GETTING|DOCKER|SETUP|OPENROUTER"

      - name: Validate documentation
        run: |
          test -f README.md
          test -f GETTING_STARTED.md
          test -f DOCKER_GUIDE_FOR_BEGINNERS.md
          echo "✓ All documentation files present"

notification:
  name: Notify Release
  runs-on: ubuntu-latest
  needs: [create-release, publish-docs]
  if: always()
  steps:
    - name: Log completion
      run: |
        echo "Release workflow completed"
        echo "GitHub Release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
