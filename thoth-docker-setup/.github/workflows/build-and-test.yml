name: Build & Test Docker Image

on:
  push:
    branches: [ main, feature/* ]
    tags: [ v* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Docker Image
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux/amd64
          - os: macos-latest
            platform: darwin/amd64
          - os: windows-latest
            platform: windows/amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker (Linux only)
        if: runner.os == 'Linux'
        uses: docker/setup-buildx-action@v2

      - name: Set up Docker Desktop (macOS/Windows)
        if: runner.os != 'Linux'
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker-compose build --no-cache
        working-directory: ${{ github.workspace }}

      - name: Verify Docker image
        run: docker images | grep thoth-app
        if: always()

  syntax-check:
    name: Syntax & Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Shellcheck - setup.sh
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          format: gcc
          severity: warning

      - name: Validate YAML
        run: |
          python3 -c "import yaml; yaml.safe_load(open('docker-compose.yml'))"
          python3 -c "import json; json.load(open('skill-manifest.json'))"

      - name: Validate shell scripts
        run: |
          bash -n setup.sh
          bash -n check-docker.sh
          bash -n preflight-check.sh

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: Check for hardcoded IPs
        run: |
          echo "Checking for hardcoded internal IPs..."
          if grep -r "10\.0\." . --include="*.md" --include="*.sh" --include="*.yml" --include="*.yaml" | grep -v "<ip>" | grep -v "10.0.0.0/8"; then
            echo "ERROR: Found hardcoded internal IPs"
            exit 1
          fi
          echo "✓ No hardcoded internal IPs found"

      - name: Check for exposed credentials
        run: |
          echo "Checking for exposed API keys..."
          if grep -r "sk-" . --include="*.md" --include="*.sh" --include="*.yml" --include="*.yaml" --include="*.json" | grep -v "sk-or-" | grep -v "sk-ant-" | grep -v "<api-key>" | grep -v "sk-your"; then
            echo "WARNING: Potential exposed credentials detected"
            exit 1
          fi
          echo "✓ No exposed credentials found"

  documentation:
    name: Documentation Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check README exists
        run: test -f README.md || (echo "README.md not found" && exit 1)

      - name: Check CLAUDE.md exists
        run: test -f CLAUDE.md || (echo "CLAUDE.md not found" && exit 1)

      - name: Verify markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'

      - name: Check changelog updated
        run: |
          if git log --oneline -1 | grep -q "v0.5.0"; then
            grep -q "0.5.0" CHANGELOG.md || (echo "CHANGELOG.md not updated for v0.5.0" && exit 1)
          fi

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy .env.example to .env
        run: cp .env.example .env

      - name: Validate .env configuration
        run: |
          echo "Checking .env required variables..."
          grep -q "THOTH_PORT" .env || (echo "THOTH_PORT missing" && exit 1)
          grep -q "OLLAMA_BASE_URL" .env || (echo "OLLAMA_BASE_URL missing" && exit 1)
          grep -q "THOTH_DATA_DIR" .env || (echo "THOTH_DATA_DIR missing" && exit 1)
          grep -q "THOTH_WORKSPACE_DIR" .env || (echo "THOTH_WORKSPACE_DIR missing" && exit 1)
          echo "✓ All required variables present"

      - name: Validate docker-compose configuration
        run: docker-compose config > /dev/null

      - name: Test setup scripts
        run: |
          echo "Testing shell script syntax..."
          bash -n setup.sh
          bash -n check-docker.sh
          bash -n preflight-check.sh
          echo "✓ All scripts have valid syntax"

      - name: Validate skill manifest
        run: |
          python3 << 'EOF'
          import json
          with open('skill-manifest.json', 'r') as f:
              manifest = json.load(f)
          assert manifest['name'] == 'thoth-docker-setup'
          assert 'version' in manifest
          assert manifest['version'] == '0.5.0'
          assert 'description' in manifest
          assert 'author' in manifest
          print("✓ Skill manifest is valid")
          EOF

status-check:
  name: CI Status Check
  runs-on: ubuntu-latest
  needs: [build, syntax-check, security-scan, documentation, integration-test]
  if: always()
  steps:
    - name: Check all jobs passed
      run: |
        if [[ "${{ needs.build.result }}" != "success" ]] || \
           [[ "${{ needs.syntax-check.result }}" != "success" ]] || \
           [[ "${{ needs.security-scan.result }}" != "success" ]] || \
           [[ "${{ needs.documentation.result }}" != "success" ]] || \
           [[ "${{ needs.integration-test.result }}" != "success" ]]; then
          echo "❌ CI checks failed"
          exit 1
        fi
        echo "✅ All CI checks passed"
